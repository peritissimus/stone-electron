<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stone - Note Taking App</title>
    <script>
      // Apply dark mode immediately to prevent flash
      (function () {
        const stored = localStorage.getItem('stone-ui-preferences');
        if (stored) {
          try {
            const parsed = JSON.parse(stored);
            const theme = parsed.state?.theme || 'dark';
            if (
              theme === 'dark' ||
              (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)
            ) {
              document.documentElement.classList.add('dark');
            }
          } catch (e) {
            document.documentElement.classList.add('dark');
          }
        } else {
          // Default to dark mode
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root">
      <!-- Minimal loading screen -->
      <div
        id="app-loading"
        style="
          display: flex;
          flex-direction: column;
          align-items: center;
          justify-content: center;
          height: 100vh;
          font-family:
            system-ui,
            -apple-system,
            sans-serif;
          color: hsl(240 5% 65%);
          gap: 16px;
        "
      >
        <div
          style="
            width: 24px;
            height: 24px;
            border: 2px solid hsl(240 5% 25%);
            border-top-color: hsl(240 5% 65%);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
          "
        ></div>
        <span style="font-size: 14px; font-weight: 500">Loading Stone...</span>
      </div>
      <style>
        @keyframes spin {
          to {
            transform: rotate(360deg);
          }
        }
      </style>
    </div>
  </body>
  <script type="module" src="/src/renderer/main.tsx"></script>
</html>
