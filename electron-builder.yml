appId: com.stone.app
productName: Stone
nodeGypRebuild: false
npmRebuild: false

# File associations — registers Stone in the OS "Open With" menu for
# Markdown files. On macOS this writes CFBundleDocumentTypes into the
# app's Info.plist; on Windows it writes registry entries during install.
# `rank: Alternate` makes Stone appear in the Open With menu without
# claiming the default handler on install — change to `Owner` if you
# want Stone to become the default when installed.
fileAssociations:
  - ext:
      - md
      - markdown
    name: Markdown Document
    description: Markdown source file
    role: Editor
    rank: Alternate
    mimeType: text/markdown

# Ad-hoc sign the macOS bundle after assembly (we have no Apple Developer ID).
# Without this, the unsigned bundle's invalid signature makes Gatekeeper
# reject a quarantined download as "damaged".
afterPack: ./scripts/afterPack.cjs

directories:
  buildResources: build
  output: dist/build

# Only include production files - electron-builder will handle node_modules
files:
  - dist/main/**/*
  - dist/renderer/**/*
  - dist/preload.cjs
  - package.json
  - migrations/**/*
  # Exclude unnecessary files
  - "!**/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/{test,__tests__,tests,powered-test,spec,specs}/**"
  - "!**/*.{map,ts,tsx,md,markdown}"
  - "!**/.{eslint,prettier,github,vscode}*"
  - "!**/node_modules/**/{.bin,.cache,.github,.vscode}"
  - "!**/node_modules/**/*.d.ts"
  - "!**/node_modules/**/{tsconfig,jest,webpack,rollup,vite}*.json"
  - "!**/node_modules/**/LICENSE*"
  - "!**/node_modules/**/{example,examples,demo,demos,doc,docs}/**"

# Enable asar for app code, but unpack all node_modules. Selective unpacking
# breaks once a native module needs to require() a sibling dep — Node's
# resolver can't walk from app.asar.unpacked back into app.asar — so any
# unpacked module's full transitive closure must also be unpacked. Doing it
# wholesale avoids the whack-a-mole. Also unpack the worker bundle, since
# worker_threads.Worker() can't load entry files from inside app.asar.
asar: true
compression: maximum

asarUnpack:
  - node_modules/**/*
  - dist/main/workers/**/*

# Bundled loose assets (all platforms): app icon reused by the tray.
extraResources:
  - from: build/icon.png
    to: icon.png

mac:
  target:
    - dmg
    - zip
  category: public.app-categories.productivity
  # Unsigned ad-hoc distribution: no Apple Developer ID, no notarization.
  # hardenedRuntime is OFF on purpose — a hardened-runtime app that isn't
  # notarized triggers Gatekeeper's hard "Stone is damaged" block on a
  # quarantined download. Without it, the same download shows the softer
  # "unidentified developer" prompt with a right-click → Open escape hatch.
  # To notarize later: set identity to a "Developer ID Application" cert,
  # flip hardenedRuntime back to true, and add the notarize block plus
  # CSC_LINK / APPLE_* credentials.
  # electron-builder skips its own signing here; scripts/afterPack.js then
  # ad-hoc signs the assembled bundle so the signature is valid (see hook).
  identity: null
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: false
  gatekeeperAssess: false
  # TCC usage descriptions — a hardened-runtime app that touches the mic
  # without NSMicrophoneUsageDescription is killed by macOS, not prompted.
  extendInfo:
    NSMicrophoneUsageDescription: >-
      Stone uses the microphone to record meetings and voice notes, which
      are transcribed locally on your device.
    NSAudioCaptureUsageDescription: >-
      Stone captures system audio so meeting recordings include other
      participants. Audio is transcribed locally and deleted afterward.
  # Minimize app size
  minimumSystemVersion: "10.15"
  # whisper.cpp CLI for local transcription (built by scripts/build-whisper.sh).
  extraResources:
    - from: vendor/whisper/bin
      to: whisper

dmg:
  title: ${productName} ${version}
  # Instructional window: app icon + Applications drop target flank the
  # arrow, with first-launch "Open Anyway" steps baked into the background.
  # This is the free way to guide users past the not-notarized Gatekeeper
  # prompt — we can't render Apple's own "Open Anyway" button.
  background: build/dmg-background.png
  window:
    width: 540
    height: 400
  iconSize: 110
  contents:
    - x: 130
      y: 185
      type: file
    - x: 410
      y: 185
      type: link
      path: /Applications

win:
  target:
    - nsis
    - portable
  certificateFile: null
  certificatePassword: null

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  target:
    - AppImage
    - deb
  category: Utility

appImage:
  artifactName: Stone-${version}.${ext}

deb:
  artifactName: Stone-${version}.${ext}

# Optimize packaging
buildDependenciesFromSource: false
