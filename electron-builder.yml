appId: com.stone.app
productName: Stone
nodeGypRebuild: false
npmRebuild: false

# File associations — registers Stone in the OS "Open With" menu for
# Markdown files. On macOS this writes CFBundleDocumentTypes into the
# app's Info.plist; on Windows it writes registry entries during install.
# `rank: Alternate` makes Stone appear in the Open With menu without
# claiming the default handler on install — change to `Owner` if you
# want Stone to become the default when installed.
fileAssociations:
  - ext:
      - md
      - markdown
    name: Markdown Document
    description: Markdown source file
    role: Editor
    rank: Alternate
    mimeType: text/markdown

directories:
  buildResources: build
  output: dist/build

# Only include production files - electron-builder will handle node_modules
files:
  - dist/main/**/*
  - dist/renderer/**/*
  - dist/preload.cjs
  - package.json
  - migrations/**/*
  # Exclude unnecessary files
  - "!**/{CHANGELOG.md,README.md,README,readme.md,readme}"
  - "!**/{test,__tests__,tests,powered-test,spec,specs}/**"
  - "!**/*.{map,ts,tsx,md,markdown}"
  - "!**/.{eslint,prettier,github,vscode}*"
  - "!**/node_modules/**/{.bin,.cache,.github,.vscode}"
  - "!**/node_modules/**/*.d.ts"
  - "!**/node_modules/**/{tsconfig,jest,webpack,rollup,vite}*.json"
  - "!**/node_modules/**/LICENSE*"
  - "!**/node_modules/**/{example,examples,demo,demos,doc,docs}/**"

# Enable asar for app code, but unpack all node_modules. Selective unpacking
# breaks once a native module needs to require() a sibling dep — Node's
# resolver can't walk from app.asar.unpacked back into app.asar — so any
# unpacked module's full transitive closure must also be unpacked. Doing it
# wholesale avoids the whack-a-mole. Also unpack the worker bundle, since
# worker_threads.Worker() can't load entry files from inside app.asar.
asar: true
compression: maximum

asarUnpack:
  - node_modules/**/*
  - dist/main/workers/**/*

mac:
  target:
    - dmg
    - zip
  category: public.app-categories.productivity
  # For development: identity: null (ad-hoc signing)
  # For distribution: remove this line and set CSC_LINK/CSC_KEY_PASSWORD env vars
  identity: null
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  # TCC usage descriptions — a hardened-runtime app that touches the mic
  # without NSMicrophoneUsageDescription is killed by macOS, not prompted.
  extendInfo:
    NSMicrophoneUsageDescription: >-
      Stone uses the microphone to record meetings and voice notes, which
      are transcribed locally on your device.
  # Minimize app size
  minimumSystemVersion: "10.15"
  # Native helpers (stone-audio-tap: ScreenCaptureKit system-audio capture).
  # Built by scripts/build-native.sh before packaging.
  extraResources:
    - from: native/bin
      to: native

win:
  target:
    - nsis
    - portable
  certificateFile: null
  certificatePassword: null

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

linux:
  target:
    - AppImage
    - deb
  category: Utility

appImage:
  artifactName: Stone-${version}.${ext}

deb:
  artifactName: Stone-${version}.${ext}

# Optimize packaging
buildDependenciesFromSource: false
